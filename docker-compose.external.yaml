# External: PostgreSQL und Keycloak laufen extern.
# Für Coolify: DATABASE_URL und Keycloak-Credentials in der UI setzen.
#
# Routing-Konvention (Coolify dockercompose build pack):
#   - Service-Name = Key in docker_compose_domains ("urlaubsplaner")
#   - "expose: [PORT]" macht den Port intern erreichbar, ohne ihn am Host zu binden
#   - KEINE eigenen Traefik-Labels — Coolify generiert Router/Service/Network-Labels
#     automatisch aus docker_compose_domains und hängt den Container ins richtige
#     Proxy-Netzwerk ("coolify" bzw. das in der UI ausgewählte Predefined Network).

services:
  urlaubsplaner:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_URL=${SERVICE_URL_URLAUBSPLANER}
      - NEXTAUTH_SECRET=${SERVICE_BASE64_URLAUBSPLANER}
      - AUTH_KEYCLOAK_ID=${AUTH_KEYCLOAK_ID}
      - AUTH_KEYCLOAK_SECRET=${AUTH_KEYCLOAK_SECRET}
      - AUTH_KEYCLOAK_ISSUER=${AUTH_KEYCLOAK_ISSUER:-https://auth.samt-con.de/realms/culture-fusion}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-urlaubsplaner.me}
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      # Use node instead of wget: node is guaranteed to exist in the runtime
      # image and gives us full HTTP status-code control. The /api/health
      # route does not touch the DB, Keycloak or NextAuth, so it stays cheap
      # and reliable.
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
