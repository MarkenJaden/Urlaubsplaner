# External: PostgreSQL und Keycloak laufen extern.
# Für Coolify: DATABASE_URL und Keycloak-Credentials in der UI setzen.

services:
  urlaubsplaner:
    build: .
    environment:
      - NEXTAUTH_URL=${SERVICE_URL_URLAUBSPLANER}
      - NEXTAUTH_SECRET=${SERVICE_BASE64_URLAUBSPLANER}
      - AUTH_KEYCLOAK_ID=${AUTH_KEYCLOAK_ID:?}
      - AUTH_KEYCLOAK_SECRET=${AUTH_KEYCLOAK_SECRET:?}
      - AUTH_KEYCLOAK_ISSUER=${AUTH_KEYCLOAK_ISSUER:?https://auth.samt-con.de/realms/culture-fusion}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - DATABASE_URL=${DATABASE_URL:?}
    ports:
      - "3000"
    labels:
      - traefik.enable=true
      - traefik.http.services.urlaubsplaner-svc.loadbalancer.server.port=3000
      - traefik.http.routers.http-0-oijmrvqenai4edth8wih76xs-urlaubsplaner.service=urlaubsplaner-svc
      - traefik.http.routers.http-1-oijmrvqenai4edth8wih76xs-urlaubsplaner.service=urlaubsplaner-svc
      - traefik.http.routers.https-0-oijmrvqenai4edth8wih76xs-urlaubsplaner.service=urlaubsplaner-svc
      - traefik.http.routers.https-1-oijmrvqenai4edth8wih76xs-urlaubsplaner.service=urlaubsplaner-svc
      - traefik.docker.network=markenjaden
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
