services:
  urlaubsplaner:
    build: .
    environment:
      - NEXTAUTH_URL=${SERVICE_URL_URLAUBSPLANER}
      - NEXTAUTH_SECRET=${SERVICE_BASE64_URLAUBSPLANER}
      - AUTH_KEYCLOAK_ID=${AUTH_KEYCLOAK_ID:?}
      - AUTH_KEYCLOAK_SECRET=${AUTH_KEYCLOAK_SECRET:?}
      - AUTH_KEYCLOAK_ISSUER=${AUTH_KEYCLOAK_ISSUER:-https://auth.samt-con.de/realms/culture-fusion}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - DATABASE_URL=postgres://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/${POSTGRES_DB:-urlaubsplaner}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=${SERVICE_USER_POSTGRES}
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}
      - POSTGRES_DB=${POSTGRES_DB:-urlaubsplaner}
    volumes:
      - urlaubsplaner-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-ARGS", "pg_isready", "-U", "$${POSTGRES_USER}", "-d", "$${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  urlaubsplaner-db:
